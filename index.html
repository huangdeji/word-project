<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Word App</title>
  <!--
    登录成功前提（Supabase 网页控制台，不是只改本文件）：
    Authentication → URL Configuration
      Site URL = https://huangdeji.github.io/word-project/
      Redirect URLs 须包含（建议两条都加）：
        https://huangdeji.github.io/word-project
        https://huangdeji.github.io/word-project/
    保存后再点「发送登录链接」，用新邮件里的链接打开（旧邮件仍可能是 localhost）。
  -->
</head>
<body>

<h2>登录</h2>
<input id="email" placeholder="输入邮箱">
<button onclick="login()">发送登录链接</button>

<hr>

<h2>添加单词</h2>
<input id="word" placeholder="单词">
<input id="meaning" placeholder="意思">
<input type="file" id="file">
<button onclick="save()">保存</button>

<hr>

<h2>列表</h2>
<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 线上地址（与 Supabase → Authentication → URL Configuration 中 Site URL、Redirect URLs 保持一致）
const SITE_URL = "https://huangdeji.github.io/word-project/"

const client = supabase.createClient(
  "https://ucvdvjapgasagvwmfmjk.supabase.co",
  "sb_publishable_vjeaQ-jp5hwF5s1-dCDv2A_MrcqPqRq",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
)

// 邮件链接若失败，地址会变成 #error=...，这里提示并清掉 hash，避免反复弹窗
function notifyAuthUrlError() {
  const raw = window.location.hash.replace(/^#/, "")
  if (!raw) return
  const p = new URLSearchParams(raw)
  if (!p.get("error")) return
  const desc = decodeURIComponent(p.get("error_description") || p.get("error") || "未知错误")
  alert(
    "登录失败：" +
      desc +
      "\n\n若邮件链接仍指向 localhost，请到 Supabase → Authentication → URL Configuration，把 Site URL 与 Redirect URLs 设成与页面里 SITE_URL 一致，保存后再重新发一封登录邮件。"
  )
  history.replaceState(null, "", window.location.pathname + window.location.search)
}

notifyAuthUrlError()

// 登录
async function login() {
  const email = document.getElementById('email').value.trim()
  if (!email) {
    alert("请输入邮箱")
    return
  }
  const { error } = await client.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: SITE_URL }
  })
  if (error) {
    alert("发送失败：" + error.message)
    return
  }
  alert("邮件已发送，请到邮箱点击链接（链接会打开本页并完成登录）")
}

// 保存
async function save() {
  const word = document.getElementById('word').value
  const meaning = document.getElementById('meaning').value

  const { data: userData } = await client.auth.getUser()
  const user = userData.user

  if (!user) {
    alert("请先登录")
    return
  }

  await client.from('word_jp').insert({
    user_id: user.id,
    word,
    meaning
  })

  load()
}

// 加载列表
async function load() {
  const { data, error } = await client.from('word_jp').select('*')
  if (error) {
    console.error(error)
    return
  }

  const list = document.getElementById('list')
  list.innerHTML = ''

  ;(data || []).forEach(i => {
    const div = document.createElement('div')
    div.innerHTML = `<b>${i.word}</b> - ${i.meaning}<hr>`
    list.appendChild(div)
  })
}

// 邮件链接回跳后，会话可能稍晚才就绪；用订阅在登录态变化后再拉列表，避免竞态
client.auth.onAuthStateChange(() => {
  load()
})
</script>

</body>
</html>
