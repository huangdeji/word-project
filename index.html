<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Word App</title>
  <!--
    登录成功前提（Supabase 网页控制台，不是只改本文件）：
    Authentication → URL Configuration
      Site URL = https://huangdeji.github.io/word-project/
      Redirect URLs 须包含（建议两条都加）：
        https://huangdeji.github.io/word-project
        https://huangdeji.github.io/word-project/
    保存后再点「发送登录链接」，用新邮件里的链接打开（旧邮件仍可能是 localhost）。
  -->
</head>
<body>

<h2>登录</h2>
<input id="email" placeholder="输入邮箱">
<button onclick="login()">发送登录链接</button>
<button onclick="checkLogin()">检查登录状态</button>
<div id="status" style="margin-top:8px;color:#555;"></div>

<hr>

<h2>添加单词</h2>
<input id="word" placeholder="单词">
<input id="meaning" placeholder="意思">
<input type="file" id="file">
<button onclick="save()">保存</button>

<hr>

<h2>列表</h2>
<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 线上地址（与 Supabase → Authentication → URL Configuration 中 Site URL、Redirect URLs 保持一致）
const SITE_URL = "https://huangdeji.github.io/word-project/"

const client = supabase.createClient(
  "https://ucvdvjapgasagvwmfmjk.supabase.co",
  "sb_publishable_vjeaQ-jp5hwF5s1-dCDv2A_MrcqPqRq",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
)

// 邮件链接若失败，地址会变成 #error=...，这里提示并清掉 hash，避免反复弹窗
function notifyAuthUrlError() {
  const raw = window.location.hash.replace(/^#/, "")
  if (!raw) return
  const p = new URLSearchParams(raw)
  if (!p.get("error")) return
  const desc = decodeURIComponent(p.get("error_description") || p.get("error") || "未知错误")
  alert(
    "登录失败：" +
      desc +
      "\n\n若邮件链接仍指向 localhost，请到 Supabase → Authentication → URL Configuration，把 Site URL 与 Redirect URLs 设成与页面里 SITE_URL 一致，保存后再重新发一封登录邮件。"
  )
  history.replaceState(null, "", window.location.pathname + window.location.search)
}

notifyAuthUrlError()

// 登录
async function login() {
  const email = document.getElementById('email').value.trim()
  if (!email) {
    alert("请输入邮箱")
    return
  }
  const { error } = await client.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: SITE_URL }
  })
  if (error) {
    const msg = error.message || ""
    if (/rate limit|too many|429/i.test(msg)) {
      alert(
        "邮件发送太频繁，已触发 Supabase 限制（email rate limit exceeded）。\n\n" +
          "请过一段时间再试（常见为约 1 小时内限制若干封），调试时不要连续狂点「发送登录链接」。\n\n" +
          "长期方案：在 Supabase → Project Settings → Auth 里配置自定义 SMTP，或升级套餐以提高限额。"
      )
    } else {
      alert("发送失败：" + msg)
    }
    return
  }
  alert("邮件已发送，请到邮箱点击链接（链接会打开本页并完成登录）")
}

function setStatus(text, isError = false) {
  const el = document.getElementById('status')
  el.style.color = isError ? '#b00020' : '#555'
  el.textContent = text
}

async function checkLogin(showAlert = true) {
  const { data, error } = await client.auth.getUser()
  if (error) {
    setStatus("登录状态获取失败：" + error.message, true)
    if (showAlert) alert("登录状态获取失败：" + error.message)
    return null
  }
  const user = data.user
  if (!user) {
    setStatus("未登录")
    if (showAlert) alert("当前未登录，请先通过邮件链接登录")
    return null
  }
  setStatus("已登录：" + user.email)
  if (showAlert) alert("已登录：" + user.email)
  return user
}

// 保存
async function save() {
  const word = document.getElementById('word').value
  const meaning = document.getElementById('meaning').value
  if (!word.trim() || !meaning.trim()) {
    alert("请先填写单词和意思")
    return
  }

  const user = await checkLogin(false)
  if (!user) {
    alert("请先登录")
    return
  }

  const { error } = await client.from('word_jp').insert({
    user_id: user.id,
    word: word.trim(),
    meaning: meaning.trim()
  })
  if (error) {
    console.error("insert failed:", error)
    alert("保存失败：" + error.message + "\n请检查表字段和 RLS 策略")
    return
  }

  alert("保存成功")
  load()
}

// 加载列表
async function load() {
  const user = await checkLogin(false)
  if (!user) {
    const list = document.getElementById('list')
    list.innerHTML = '<div style="color:#666;">请先登录后查看数据</div>'
    return
  }

  const { data, error } = await client
    .from('word_jp')
    .select('*')
    .eq('user_id', user.id)
    .order('id', { ascending: false })

  if (error) {
    console.error(error)
    alert("加载失败：" + error.message + "\n请检查 RLS 策略是否允许查询")
    return
  }

  const list = document.getElementById('list')
  list.innerHTML = ''

  ;(data || []).forEach(i => {
    const div = document.createElement('div')
    div.innerHTML = `<b>${i.word}</b> - ${i.meaning}<hr>`
    list.appendChild(div)
  })
}

// 邮件链接回跳后，会话可能稍晚才就绪；用订阅在登录态变化后再拉列表，避免竞态
client.auth.onAuthStateChange(() => {
  checkLogin(false)
  load()
})

checkLogin(false)
</script>

</body>
</html>
