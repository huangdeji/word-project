<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Word App</title>
</head>
<body>

<h2>登录</h2>
<input id="email" placeholder="输入邮箱">
<button onclick="login()">发送登录链接</button>

<hr>

<h2>添加单词</h2>
<input id="word" placeholder="单词">
<input id="meaning" placeholder="意思">
<input type="file" id="file">
<button onclick="save()">保存</button>

<hr>

<h2>列表</h2>
<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://ucvdvjapgasagvwmfmjk.supabase.co",
  "sb_publishable_vjeaQ-jp5hwF5s1-dCDv2A_MrcqPqRq"
)

// 登录
async function login() {
  const email = document.getElementById('email').value
  await client.auth.signInWithOtp({ email })
  alert("邮件已发送")
}

// 保存
async function save() {
  const word = document.getElementById('word').value
  const meaning = document.getElementById('meaning').value

  const { data: userData } = await client.auth.getUser()
  const user = userData.user

  if (!user) {
    alert("请先登录")
    return
  }

  await client.from('word_jp').insert({
    user_id: user.id,
    word,
    meaning
  })

  load()
}

// 加载列表
async function load() {
  const { data } = await client.from('word_jp').select('*')

  const list = document.getElementById('list')
  list.innerHTML = ''

  data.forEach(i => {
    const div = document.createElement('div')
    div.innerHTML = `<b>${i.word}</b> - ${i.meaning}<hr>`
    list.appendChild(div)
  })
}

load()
</script>

</body>
</html>
